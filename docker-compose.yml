services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pgateway
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend/core
    command: >
      sh -c "python backend/core/manage.py migrate &&
             python backend/core/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend/core
    command: celery -A core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  pgdata:
